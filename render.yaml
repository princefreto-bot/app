# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: eduanalytics-saas
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npx --yes vite build
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
